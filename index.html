<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xhook — Lua API</title>
  <meta name="description" content="Lua scripting API reference for the xhook CS 1.6 cheat" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --accent: #19d3ff;
      --bg: #0b0e14;
      --bg2: #10151f;
      --panel: #0e1320;
      --text: #d6dde8;
      --muted: #8b97a8;
      --border: #1c2534;
    }
    body { background: var(--bg); color: var(--text); }
    .sidebar, .sidebar-toggle { background: var(--bg2); border-right: 1px solid var(--border); }
    .sidebar ul li a { color: var(--muted); font-weight: 400; }
    .sidebar ul li a:hover, .sidebar ul li.active > a { color: var(--accent); font-weight: 600; }
    .sidebar > h1 a { color: var(--accent); }
    .app-name-link { color: var(--accent) !important; }
    .markdown-section { color: var(--text); max-width: 900px; }
    .markdown-section h1, .markdown-section h2 { color: #fff; }
    .markdown-section h2 { border-bottom: 1px solid var(--border); padding-bottom: .3em; }
    .markdown-section h3 { color: var(--accent); }
    .markdown-section a { color: var(--accent); }
    .markdown-section tr { background: transparent; border-top: 1px solid var(--border); }
    .markdown-section tr:nth-child(2n) { background: var(--panel); }
    .markdown-section th, .markdown-section td { border: 1px solid var(--border); }
    .markdown-section code { color: #ffd27a; background: #141b28; }
    .markdown-section pre, .markdown-section pre > code { background: #0c111b !important; }
    .markdown-section blockquote { border-left: 4px solid var(--accent); background: var(--panel); color: var(--text); border-radius: 4px; }
    .markdown-section blockquote p { color: var(--text); }
    .search input { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
    .search .matching-post { border-bottom: 1px solid var(--border); }
    .search p.empty { color: var(--muted); }
    .docsify-copy-code-button { background: var(--accent) !important; color: #06121a !important; }
    /* cover */
    section.cover { background: radial-gradient(1200px 600px at 70% -10%, rgba(25,211,255,.14), transparent), var(--bg) !important; }
    section.cover .cover-main > p a { border-color: var(--accent); color: var(--accent); }
    section.cover .cover-main > p a:hover { background: var(--accent); color: #06121a; }
    section.cover h1 { color: #fff; }
    section.cover blockquote p { color: var(--muted); }
  </style>
</head>
<body>
  <div id="app">Loading the xhook Lua docs…</div>
  <script>
    window.$docsify = {
      name: 'xhook · Lua',
      repo: 'https://github.com/T4lk/xhook-lua-docs',
      loadSidebar: true,
      auto2top: true,
      coverpage: true,
      onlyCover: false,
      maxLevel: 3,
      subMaxLevel: 3,
      themeColor: '#19d3ff',
      search: {
        placeholder: 'Search the API…',
        noData: 'Nothing found.',
        depth: 4
      },
      copyCode: { buttonText: 'copy', errorText: 'error', successText: 'copied' }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-lua.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-glsl.min.js"></script>
</body>
</html>
